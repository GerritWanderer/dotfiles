onboarding = false
[terminal]
default_shell = "zsh"

[theme]
name = "tokyo-night"
auto_switch = false

[ui]
agent_panel_sort = "spaces"

[ui.toast]
delivery = "system"

[keys]
prefix = "ctrl+space"
detach = "prefix+q"
toggle_sidebar = "prefix+b"

new_workspace = "prefix+shift+c"
rename_workspace = "prefix+shift+r"
close_workspace = "prefix+shift+k"
next_workspace = ["prefix+shift+n", "alt+down"]
previous_workspace = ["prefix+shift+p", "alt+up"]

switch_tab = ["prefix+1..9", "alt+1..9"]

focus_pane_left = ["prefix+h", "ctrl+alt+left"]
focus_pane_down = ["prefix+j", "ctrl+alt+down"]
focus_pane_up = ["prefix+k", "ctrl+alt+up"]
focus_pane_right = ["prefix+l", "ctrl+alt+right"]
